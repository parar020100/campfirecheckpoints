# src/main/resources/plugin.yml
name: CampfireCheckpoints
version: '1.2.0'
main: com.campfirecheckpoints.CampfireCheckpoints
api-version: '1.21'
description: A respawn system using campfires as checkpoints
author: fbi + tweaks by parar020100

commands:
  cc:
    description: Manage your campfire checkpoints
    usage: /<command> [list|delete|info|reload]
    aliases:
      - camp
      - checkpoint
      - campfire

permissions:
  campfirecheckpoints.use:
    description: Allows using campfire checkpoints
    default: true
  campfirecheckpoints.reload:
    description: Allows reloading the plugin configuration
    default: op
  campfirecheckpoints.admin:
    description: Full admin access
    default: op
    children:
      campfirecheckpoints.use: true
      campfirecheckpoints.reload: true